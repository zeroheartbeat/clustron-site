
<svg xmlns="http://www.w3.org/2000/svg" width="420" height="260" viewBox="0 0 420 260">

<style>
.monitor { fill:#eef3fb; stroke:#5b7bbf; stroke-width:2; }
.screen { fill:#ffffff; stroke:#9fb4de; stroke-width:1.5; }
.chartbar { fill:#6fbf73; }
.chartline { stroke:#4a7bd1; stroke-width:2; fill:none; }
.terminal { fill:#2f3b52; stroke:#5b7bbf; stroke-width:2; }
.prompt { fill:#ffffff; font-family: monospace; font-size:20px; }
.square { opacity:0.6; }
</style>

<!-- Monitor -->
<rect class="monitor" x="60" y="30" width="220" height="140" rx="10"/>
<rect class="screen" x="75" y="45" width="190" height="110" rx="6"/>

<!-- Bars -->
<rect class="chartbar" x="90" y="60" width="12" height="40"/>
<rect class="chartbar" x="110" y="70" width="12" height="30"/>
<rect class="chartbar" x="130" y="55" width="12" height="45"/>
<rect class="chartbar" x="150" y="75" width="12" height="25"/>

<!-- Line chart -->
<polyline class="chartline" points="90,130 120,120 150,125 180,110 210,120 240,105"/>

<!-- Terminal -->
<rect class="terminal" x="230" y="80" width="140" height="110" rx="10"/>
<text class="prompt" x="255" y="140">&gt;_</text>

<!-- Floating squares -->
<rect class="square" x="150" y="190" width="12" height="12" fill="#6fbf73"/>
<rect class="square" x="175" y="205" width="12" height="12" fill="#4a7bd1"/>
<rect class="square" x="200" y="190" width="12" height="12" fill="#9fb4de"/>
<rect class="square" x="225" y="205" width="12" height="12" fill="#6fbf73"/>

</svg>
