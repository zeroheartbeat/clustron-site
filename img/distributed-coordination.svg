
<svg xmlns="http://www.w3.org/2000/svg" width="420" height="320" viewBox="0 0 420 320">

<style>
.node { fill:#eef3fb; stroke:#5b7bbf; stroke-width:2; }
.slot { fill:#ffffff; stroke:#9fb4de; stroke-width:1.5; }
.arrow { stroke:#34c38f; stroke-width:2.5; stroke-dasharray:6 6; fill:none; marker-end:url(#arrow); }
.lock { fill:#f4c542; stroke:#c79a1b; stroke-width:2; }
.eye { fill:#34c38f; stroke:#2f3b52; stroke-width:2; }
.crown { fill:#f4c542; stroke:#c79a1b; stroke-width:2; }
</style>

<defs>
<marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
<polygon points="0 0, 8 3, 0 6" fill="#34c38f"/>
</marker>
</defs>

<!-- Crown (leader) -->
<polygon class="crown" points="195,40 210,20 225,40 245,25 235,55 185,55 175,25"/>

<!-- Leader node -->
<g transform="translate(175,60)">
<rect class="node" width="70" height="90" rx="8"/>
<rect class="slot" x="10" y="12" width="50" height="18" rx="3"/>
<rect class="slot" x="10" y="36" width="50" height="18" rx="3"/>
<rect class="slot" x="10" y="60" width="50" height="18" rx="3"/>
</g>

<!-- Left follower -->
<g transform="translate(60,190)">
<rect class="node" width="70" height="80" rx="8"/>
<rect class="slot" x="10" y="10" width="50" height="18" rx="3"/>
<rect class="slot" x="10" y="34" width="50" height="18" rx="3"/>
</g>

<!-- Right follower -->
<g transform="translate(290,190)">
<rect class="node" width="70" height="80" rx="8"/>
<rect class="slot" x="10" y="10" width="50" height="18" rx="3"/>
<rect class="slot" x="10" y="34" width="50" height="18" rx="3"/>
</g>

<!-- Lock icon -->
<g transform="translate(140,230)">
<rect class="lock" width="28" height="28" rx="4"/>
<path d="M148 230 v-8 a6 6 0 0 1 12 0 v8" fill="none" stroke="#c79a1b" stroke-width="2"/>
</g>

<!-- Eye icon -->
<g transform="translate(230,235)">
<ellipse class="eye" cx="20" cy="10" rx="18" ry="10"/>
<circle cx="20" cy="10" r="4" fill="#2f3b52"/>
</g>

<!-- Coordination arrows -->
<path class="arrow" d="M210 150 L95 190"/>
<path class="arrow" d="M210 150 L325 190"/>
<path class="arrow" d="M130 230 L290 230"/>

</svg>
